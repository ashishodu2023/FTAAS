services:
  ftaas:
    build: .
    command: python -m ftaas_app.main
    ports: ["8080:8080"]
    environment:
      FTAAS_JOBS_URL: http://127.0.0.1:8080
      FTAAS_DATASETS_URL: http://127.0.0.1:8080
      FTAAS_PIPELINES_URL: http://127.0.0.1:8080
      FTAAS_SERVING_URL: http://127.0.0.1:8080
      FTAAS_DATA_DIR: /data
      PYTHONPATH: /app:/app/packages/ftaas_sdk:/app/services
    volumes: ["./data:/data", ".:/app"]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    profiles: ["mlflow"]
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlartifacts
    ports: ["5000:5000"]
    volumes: ["./data/mlartifacts:/mlartifacts"]
