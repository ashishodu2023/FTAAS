# FTAAS platform configuration — unified single-process gateway by default
platform:
  name: Fine Tuning as a Service
  env: local

services:
  ftaas:
    host: 0.0.0.0
    port: 8080
  control:
    host: 0.0.0.0
    port: 8080
    db_url: sqlite+aiosqlite:///./data/control.db
  registry:
    host: 0.0.0.0
    port: 8080
    db_url: sqlite+aiosqlite:///./data/registry.db
    storage_root: ./data/datasets
  workflow:
    host: 0.0.0.0
    port: 8080
    db_url: sqlite+aiosqlite:///./data/workflow.db
  deploy:
    host: 0.0.0.0
    port: 8080
    db_url: sqlite+aiosqlite:///./data/deploy.db
  console:
    host: 0.0.0.0
    port: 8080

integrations:
  mlflow:
    tracking_uri: sqlite:///./data/mlflow.db
    experiment: ftaas-finetune
  ray:
    address: auto
    mock: true
  airflow:
    enabled: false
  gcs:
    mock: true
    local_mirror: ./data/gcs_mirror

frameworks:
  - transformers
  - trl
  - verl
  - llama-factory
  - unsloth
  - axolotl

techniques:
  full_finetune:
    - 16bit_full
    - frozen
  peft:
    - lora
    - qlora
    - dora
    - lora_plus
    - longlora
    - loftq
    - pissa
    - prefix_tuning
    - adapter_tuning
    - bitfit
    - ia3
  instruction_tuning:
    - sft
    - multimodal_instruction
    - self_instruct
  alignment:
    - reward_modeling
    - ppo
    - dpo
    - orpo

defaults:
  framework: transformers
  technique: lora
  model_name: sshleifer/tiny-gpt2
  hyperparameters:
    learning_rate: 2.0e-4
    num_train_epochs: 1
    per_device_train_batch_size: 2
    lora_r: 8
    lora_alpha: 16
    max_steps: 10
    output_dir: ./data/outputs
