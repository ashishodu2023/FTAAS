# FTAAS platform configuration — unified single-process gateway by default
platform:
  name: Fine Tuning as a Service
  env: local

services:
  ftaas:
    host: 0.0.0.0
    port: 8080
  control:
    host: 0.0.0.0
    port: 8080
  registry:
    host: 0.0.0.0
    port: 8080
  workflow:
    host: 0.0.0.0
    port: 8080
  deploy:
    host: 0.0.0.0
    port: 8080
  console:
    host: 0.0.0.0
    port: 8080

integrations:
  mlflow:
    # resolved at runtime under FTAAS_DATA_DIR
    tracking_uri: ""
    experiment: ftaas-finetune
  ray:
    address: auto
    # false = try Ray; if Ray unavailable, still runs real in-process training
    mock: false
  airflow:
    enabled: false
  gcs:
    # false = require real dataset files (no placeholder JSONL)
    mock: false
    local_mirror: gcs_mirror

frameworks:
  - transformers
  - trl
  - verl
  - llama-factory
  - unsloth
  - axolotl

techniques:
  full_finetune:
    - 16bit_full
    - frozen
  peft:
    - lora
    - qlora
    - dora
    - lora_plus
    - longlora
    - loftq
    - pissa
    - prefix_tuning
    - adapter_tuning
    - bitfit
    - ia3
  instruction_tuning:
    - sft
    - multimodal_instruction
    - self_instruct
  alignment:
    - reward_modeling
    - ppo
    - dpo
    - orpo

defaults:
  framework: transformers
  technique: lora
  model_name: sshleifer/tiny-gpt2
  hyperparameters:
    learning_rate: 2.0e-4
    num_train_epochs: 1
    per_device_train_batch_size: 2
    lora_r: 8
    lora_alpha: 16
    max_steps: 10
    output_dir: ./data/outputs
