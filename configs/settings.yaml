# FTAAS platform configuration — unified single-process gateway by default
platform:
  name: Fine Tuning as a Service
  env: local

services:
  ftaas:
    host: 0.0.0.0
    port: 8080
  control:
    host: 0.0.0.0
    port: 8080
  registry:
    host: 0.0.0.0
    port: 8080
  workflow:
    host: 0.0.0.0
    port: 8080
  deploy:
    host: 0.0.0.0
    port: 8080
  console:
    host: 0.0.0.0
    port: 8080

integrations:
  mlflow:
    # resolved at runtime under FTAAS_DATA_DIR
    tracking_uri: ""
    experiment: ftaas-finetune
  ray:
    address: auto
    # false = try Ray; if Ray unavailable, still runs real in-process training
    mock: false
  airflow:
    enabled: false
  gcs:
    # false = require real dataset files (no placeholder JSONL)
    mock: false
    local_mirror: gcs_mirror

frameworks:
  - transformers
  - trl
  - verl
  - llama-factory
  - unsloth
  - axolotl

techniques:
  full_finetune:
    - 16bit_full
    - frozen
  peft:
    - lora
    - qlora
    - dora
    - lora_plus
    - longlora
    - loftq
    - pissa
    - prefix_tuning
    - adapter_tuning
    - bitfit
    - ia3
  instruction_tuning:
    - sft
    - multimodal_instruction
    - self_instruct
  alignment:
    - reward_modeling
    - ppo
    - dpo
    - orpo

defaults:
  framework: transformers
  technique: lora
  # distilgpt2 ≈2× faster than gpt2 on CPU; still learns short alpaca demos
  # On GPU + QLoRA, use e.g. TinyLlama/TinyLlama-1.1B-Chat-v1.0 or a 7B Instruct
  model_name: distilgpt2
  hyperparameters:
    learning_rate: 1.0e-3
    num_train_epochs: 1
    per_device_train_batch_size: 1
    lora_r: 8
    lora_alpha: 16
    max_steps: 24
    max_seq_length: 64
    output_dir: ./data/outputs

# Training plane (overridden by env):
#   FTAAS_TRAIN_DEVICE=auto|cuda|cpu
#   FTAAS_TRAIN_MODE=local|remote
#   FTAAS_TRAINER_URL=http://gpu-worker:8090
#   FTAAS_PUBLIC_URL=https://ftaas.org
# See docs/gpu-training.md
