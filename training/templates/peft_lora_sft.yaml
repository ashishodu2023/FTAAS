# Phase 0 — Fine-Tuning & RL Templates
# Run on Cosmos Workbench (single-node or distributed)

name: peft_lora_sft
framework: transformers
technique: lora
distributed: false
model: sshleifer/tiny-gpt2
hyperparameters:
  learning_rate: 2.0e-4
  max_steps: 20
  per_device_train_batch_size: 2
  lora_r: 8
  lora_alpha: 16
  max_seq_length: 256
dataset:
  format: jsonl
  fields: [instruction, input, output]
ray:
  num_workers: 1
  use_gpu: false
mlflow:
  experiment: ftaas-finetune
