# pytest config for FTAAS
[pytest]
testpaths = tests
pythonpath =
    .
    packages/ftaas_sdk
    services
markers =
    unit: fast isolated unit tests
    integration: API / ASGI system integration tests
    slow: real model download + fine-tune (tiny-gpt2)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
